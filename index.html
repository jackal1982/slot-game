<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fortune Slots - 遊戲平台</title>
    <link rel="stylesheet" href="css/main.css?v=75">
    <link rel="stylesheet" href="css/reels.css?v=75">
    <link rel="stylesheet" href="css/ui.css?v=75">
    <link rel="stylesheet" href="css/animations.css?v=75">
    <link rel="stylesheet" href="css/responsive.css?v=75">
    <link rel="stylesheet" href="css/lobby.css?v=75">
    <link rel="stylesheet" href="css/dragon_wolf.css?v=75">
</head>
<body>
    <!-- ===== LOBBY VIEW ===== -->
    <div id="lobby-container">
        <div class="lobby-header">
            <h1>FORTUNE SLOTS</h1>
            <p class="lobby-tagline">遊戲平台</p>
        </div>

        <div class="lobby-balance-bar">
            <span class="lobby-balance-label">BALANCE:</span>
            <span id="lobby-balance-amount">50,000</span>
        </div>

        <div class="lobby-main">
            <p class="lobby-section-title">SELECT A GAME</p>
            <div id="games-grid"></div>
        </div>

        <div class="lobby-footer">
            <button id="lobby-btn-sound">SOUND: ON</button>
            <button id="lobby-btn-music">MUSIC: ON</button>
        </div>

        <!-- Low Balance Popup -->
        <div id="low-balance-overlay" class="lb-overlay" style="display:none;">
            <div id="low-balance-popup" class="lb-popup">
                <div id="lb-content-ask">
                    <h2 class="lb-title">餘額過低</h2>
                    <p class="lb-msg">您的餘額不足 1,000，是否自動補值到 50,000？</p>
                    <p class="lb-current">當前餘額：<span id="lb-current-amount"></span></p>
                    <div class="lb-buttons">
                        <button id="lb-btn-yes" class="lb-btn lb-btn-yes">是</button>
                        <button id="lb-btn-no" class="lb-btn lb-btn-no">否</button>
                    </div>
                </div>
                <div id="lb-content-success" style="display:none;">
                    <div class="lb-success-icon">✓</div>
                    <h2 class="lb-title">充值成功！</h2>
                    <p class="lb-msg">餘額已補值至 50,000</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== SPLASH (AudioContext unlock) ===== -->
    <div id="splash-screen" style="display:none;">
        <div id="splash-content">
            <h1 id="splash-title">FORTUNE SLOTS</h1>
            <p id="splash-subtitle">幸運老虎機</p>
            <button id="splash-btn">TAP TO PLAY</button>
        </div>
    </div>

    <!-- ===== GAME VIEWS (injected dynamically by router.js) ===== -->
    <div id="game-views"></div>

    <!-- Scripts: platform & router first, then game modules, then lobby & bootstrap -->
    <script src="js/config.js?v=75"></script>
    <script src="js/platform.js?v=75"></script>
    <script src="js/router.js?v=75"></script>
    <script src="js/state.js?v=75"></script>
    <script src="js/rng.js?v=75"></script>
    <script src="js/audio.js?v=75"></script>
    <script src="js/paylines.js?v=75"></script>
    <script src="js/features.js?v=75"></script>
    <script src="js/jackpot.js?v=75"></script>
    <script src="js/reels.js?v=75"></script>
    <script src="js/animations.js?v=75"></script>
    <script src="js/ui.js?v=75"></script>
    <script src="js/lobby.js?v=75"></script>
    <script src="js/main.js?v=75"></script>
    <!-- Dragon Wolf modules -->
    <script src="js/dragon_wolf/dw-config.js?v=75"></script>
    <script src="js/dragon_wolf/dw-rng.js?v=75"></script>
    <script src="js/dragon_wolf/dw-paylines.js?v=75"></script>
    <script src="js/dragon_wolf/dw-features.js?v=75"></script>
    <script src="js/dragon_wolf/dw-state.js?v=75"></script>
    <script src="js/dragon_wolf/dw-reels.js?v=75"></script>
    <script src="js/dragon_wolf/dw-audio.js?v=75"></script>
    <script src="js/dragon_wolf/dw-animations.js?v=75"></script>
    <script src="js/dragon_wolf/dw-ui.js?v=75"></script>
    <script src="js/dragon_wolf/dw-main.js?v=75"></script>
</body>
</html>
