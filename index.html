<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fortune Slots - 遊戲平台</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/reels.css">
    <link rel="stylesheet" href="css/ui.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/lobby.css">
    <link rel="stylesheet" href="css/dragon_wolf.css">
</head>
<body>
    <!-- ===== LOBBY VIEW ===== -->
    <div id="lobby-container">
        <div class="lobby-header">
            <h1>FORTUNE SLOTS</h1>
            <p class="lobby-tagline">遊戲平台</p>
        </div>

        <div class="lobby-balance-bar">
            <span class="lobby-balance-label">BALANCE:</span>
            <span id="lobby-balance-amount">10,000</span>
        </div>

        <div class="lobby-main">
            <p class="lobby-section-title">SELECT A GAME</p>
            <div id="games-grid"></div>
        </div>

        <div class="lobby-footer">
            <button id="lobby-btn-sound">SOUND: ON</button>
            <button id="lobby-btn-music">MUSIC: ON</button>
        </div>
    </div>

    <!-- ===== SPLASH (AudioContext unlock) ===== -->
    <div id="splash-screen" style="display:none;">
        <div id="splash-content">
            <h1 id="splash-title">FORTUNE SLOTS</h1>
            <p id="splash-subtitle">幸運老虎機</p>
            <button id="splash-btn">TAP TO PLAY</button>
        </div>
    </div>

    <!-- ===== GAME VIEWS (injected dynamically by router.js) ===== -->
    <div id="game-views"></div>

    <!-- Scripts: platform & router first, then game modules, then lobby & bootstrap -->
    <script src="js/config.js"></script>
    <script src="js/platform.js"></script>
    <script src="js/router.js"></script>
    <script src="js/state.js"></script>
    <script src="js/rng.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/paylines.js"></script>
    <script src="js/features.js"></script>
    <script src="js/jackpot.js"></script>
    <script src="js/reels.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/lobby.js"></script>
    <script src="js/main.js"></script>
    <!-- Dragon Wolf modules -->
    <script src="js/dragon_wolf/dw-config.js"></script>
    <script src="js/dragon_wolf/dw-rng.js"></script>
    <script src="js/dragon_wolf/dw-paylines.js"></script>
    <script src="js/dragon_wolf/dw-features.js"></script>
    <script src="js/dragon_wolf/dw-state.js"></script>
    <script src="js/dragon_wolf/dw-reels.js"></script>
    <script src="js/dragon_wolf/dw-audio.js"></script>
    <script src="js/dragon_wolf/dw-animations.js"></script>
    <script src="js/dragon_wolf/dw-ui.js"></script>
    <script src="js/dragon_wolf/dw-main.js"></script>
</body>
</html>
