<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="gg" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#c080e0"/>
      <stop offset="50%" stop-color="#8040a0"/>
      <stop offset="100%" stop-color="#401860"/>
    </radialGradient>
    <linearGradient id="gleaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c050"/>
      <stop offset="100%" stop-color="#1a6e1a"/>
    </linearGradient>
    <filter id="gshadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Stem -->
  <path d="M50,28 C50,20 52,14 54,10" fill="none" stroke="#2a7a2a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Leaf -->
  <path d="M54,10 C60,5 72,8 68,18 C65,24 58,18 54,10 Z"
    fill="url(#gleaf)" stroke="#1a6e1a" stroke-width="0.6"/>
  <path d="M55,11 C60,10 65,13 65,16" fill="none" stroke="#60d060" stroke-width="0.6" opacity="0.5"/>
  <!-- Grape cluster - top row -->
  <circle cx="50" cy="35" r="11" fill="url(#gg)" stroke="#401860" stroke-width="0.6" filter="url(#gshadow)"/>
  <ellipse cx="46" cy="31" rx="3" ry="4" fill="#d0a0f0" opacity="0.35"/>
  <!-- Row 2 -->
  <circle cx="38" cy="48" r="11" fill="url(#gg)" stroke="#401860" stroke-width="0.6" filter="url(#gshadow)"/>
  <ellipse cx="34" cy="44" rx="3" ry="4" fill="#d0a0f0" opacity="0.35"/>
  <circle cx="62" cy="48" r="11" fill="url(#gg)" stroke="#401860" stroke-width="0.6" filter="url(#gshadow)"/>
  <ellipse cx="58" cy="44" rx="3" ry="4" fill="#d0a0f0" opacity="0.35"/>
  <!-- Row 3 -->
  <circle cx="32" cy="63" r="11" fill="url(#gg)" stroke="#401860" stroke-width="0.6" filter="url(#gshadow)"/>
  <ellipse cx="28" cy="59" rx="3" ry="4" fill="#d0a0f0" opacity="0.35"/>
  <circle cx="50" cy="60" r="11" fill="url(#gg)" stroke="#401860" stroke-width="0.6" filter="url(#gshadow)"/>
  <ellipse cx="46" cy="56" rx="3" ry="4" fill="#d0a0f0" opacity="0.35"/>
  <circle cx="68" cy="63" r="11" fill="url(#gg)" stroke="#401860" stroke-width="0.6" filter="url(#gshadow)"/>
  <ellipse cx="64" cy="59" rx="3" ry="4" fill="#d0a0f0" opacity="0.35"/>
  <!-- Bottom row -->
  <circle cx="42" cy="76" r="11" fill="url(#gg)" stroke="#401860" stroke-width="0.6" filter="url(#gshadow)"/>
  <ellipse cx="38" cy="72" rx="3" ry="4" fill="#d0a0f0" opacity="0.35"/>
  <circle cx="60" cy="76" r="11" fill="url(#gg)" stroke="#401860" stroke-width="0.6" filter="url(#gshadow)"/>
  <ellipse cx="56" cy="72" rx="3" ry="4" fill="#d0a0f0" opacity="0.35"/>
  <!-- Bottom single -->
  <circle cx="50" cy="88" r="10" fill="url(#gg)" stroke="#401860" stroke-width="0.6" filter="url(#gshadow)"/>
  <ellipse cx="46" cy="84" rx="3" ry="4" fill="#d0a0f0" opacity="0.35"/>
