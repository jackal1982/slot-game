<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="cg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff8a0"/>
      <stop offset="40%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="cband" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <filter id="cshadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Crown body -->
  <path d="M15,70 L10,28 L30,48 L50,15 L70,48 L90,28 L85,70 Z"
    fill="url(#cg)" stroke="#8b6914" stroke-width="1.5" filter="url(#cshadow)"/>
  <!-- Crown band -->
  <rect x="15" y="70" width="70" height="14" rx="2" fill="url(#cband)" stroke="#8b6914" stroke-width="1"/>
  <!-- Band highlight -->
  <rect x="15" y="70" width="70" height="5" rx="1" fill="#fff8a0" opacity="0.3"/>
  <!-- Jewels on tips -->
  <circle cx="50" cy="18" r="5" fill="#ff2020" stroke="#cc0000" stroke-width="0.8"/>
  <circle cx="50" cy="16" r="2" fill="#ff8080" opacity="0.7"/>
  <circle cx="30" cy="44" r="4" fill="#2060ff" stroke="#1040c0" stroke-width="0.8"/>
  <circle cx="30" cy="42.5" r="1.5" fill="#80b0ff" opacity="0.7"/>
  <circle cx="70" cy="44" r="4" fill="#2060ff" stroke="#1040c0" stroke-width="0.8"/>
  <circle cx="70" cy="42.5" r="1.5" fill="#80b0ff" opacity="0.7"/>
  <!-- Band jewels -->
  <circle cx="35" cy="77" r="3" fill="#00c040" stroke="#008030" stroke-width="0.5"/>
  <circle cx="50" cy="77" r="3.5" fill="#ff2020" stroke="#cc0000" stroke-width="0.5"/>
  <circle cx="65" cy="77" r="3" fill="#00c040" stroke="#008030" stroke-width="0.5"/>
  <!-- Band dots -->
  <circle cx="22" cy="77" r="1.5" fill="#ffd700"/>
  <circle cx="78" cy="77" r="1.5" fill="#ffd700"/>
</svg>
