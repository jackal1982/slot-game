<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8a0"/>
      <stop offset="35%" stop-color="#ffd700"/>
      <stop offset="70%" stop-color="#daa520"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <linearGradient id="bbow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6060"/>
      <stop offset="100%" stop-color="#cc2020"/>
    </linearGradient>
    <filter id="bshadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Bell body -->
  <path d="M50,12 C50,12 30,12 25,35 C20,58 18,68 18,68 L82,68 C82,68 80,58 75,35 C70,12 50,12 50,12 Z"
    fill="url(#bg1)" stroke="#8b6914" stroke-width="1.5" filter="url(#bshadow)"/>
  <!-- Bell rim -->
  <ellipse cx="50" cy="70" rx="36" ry="8" fill="#daa520" stroke="#8b6914" stroke-width="1"/>
  <ellipse cx="50" cy="68" rx="34" ry="5" fill="#fff8a0" opacity="0.3"/>
  <!-- Clapper -->
  <circle cx="50" cy="82" r="6" fill="#8b6914" stroke="#6b4f0a" stroke-width="1"/>
  <circle cx="48" cy="80" r="2" fill="#daa520" opacity="0.6"/>
  <!-- Highlight -->
  <path d="M36,25 C36,25 40,18 50,18 C50,18 42,22 38,35 C34,48 33,58 33,58"
    fill="none" stroke="#fff8dc" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <!-- Bow -->
  <ellipse cx="42" cy="12" rx="10" ry="6" fill="url(#bbow)" stroke="#aa1515" stroke-width="0.8" transform="rotate(-15,42,12)"/>
  <ellipse cx="58" cy="12" rx="10" ry="6" fill="url(#bbow)" stroke="#aa1515" stroke-width="0.8" transform="rotate(15,58,12)"/>
  <circle cx="50" cy="13" r="4" fill="#ff4040" stroke="#cc2020" stroke-width="0.8"/>
  <circle cx="49" cy="12" r="1.5" fill="#ff8080" opacity="0.6"/>
</svg>
