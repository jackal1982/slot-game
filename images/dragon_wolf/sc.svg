<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 幽靈馬車 Scatter -->
  <defs>
    <radialGradient id="scGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E040FB" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4A0080" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="#1A0028" stroke="#9B59B6" stroke-width="2.5"/>
  <circle cx="50" cy="50" r="48" fill="url(#scGlow)"/>
  <!-- 馬車輪 -->
  <circle cx="30" cy="72" r="12" fill="none" stroke="#C39BDD" stroke-width="2.5"/>
  <line x1="30" y1="60" x2="30" y2="84" stroke="#C39BDD" stroke-width="1.5"/>
  <line x1="18" y1="72" x2="42" y2="72" stroke="#C39BDD" stroke-width="1.5"/>
  <line x1="21" y1="63" x2="39" y2="81" stroke="#C39BDD" stroke-width="1.5"/>
  <line x1="21" y1="81" x2="39" y2="63" stroke="#C39BDD" stroke-width="1.5"/>
  <circle cx="70" cy="72" r="12" fill="none" stroke="#C39BDD" stroke-width="2.5"/>
  <line x1="70" y1="60" x2="70" y2="84" stroke="#C39BDD" stroke-width="1.5"/>
  <line x1="58" y1="72" x2="82" y2="72" stroke="#C39BDD" stroke-width="1.5"/>
  <line x1="61" y1="63" x2="79" y2="81" stroke="#C39BDD" stroke-width="1.5"/>
  <line x1="61" y1="81" x2="79" y2="63" stroke="#C39BDD" stroke-width="1.5"/>
  <!-- 馬車廂 -->
  <rect x="20" y="38" width="60" height="32" rx="4" fill="#2D0A4E" stroke="#9B59B6" stroke-width="2"/>
  <rect x="26" y="44" width="18" height="14" rx="2" fill="none" stroke="#E040FB" stroke-width="1.5"/>
  <rect x="56" y="44" width="18" height="14" rx="2" fill="none" stroke="#E040FB" stroke-width="1.5"/>
  <!-- 幽靈光輝 -->
  <ellipse cx="50" cy="22" rx="16" ry="10" fill="#E040FB" opacity="0.7"/>
  <ellipse cx="50" cy="18" rx="10" ry="6" fill="white" opacity="0.8"/>
  <!-- SC 文字 -->
  <text x="50" y="96" font-family="Arial" font-size="9" font-weight="900" fill="#E040FB" text-anchor="middle" letter-spacing="1">SCATTER</text>
</svg>
