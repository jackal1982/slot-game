<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 憶無心 M4: 溫柔美人 / 暗紫飄髮 / 粉色花飾 / 大眼腮紅 / 粉紫袍 -->
  <defs>
    <radialGradient id="m4bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#3d1860"/><stop offset="100%" stop-color="#1a0832"/>
    </radialGradient>
    <linearGradient id="m4pk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e870c0"/><stop offset="50%" stop-color="#c050a0"/><stop offset="100%" stop-color="#8030a0"/>
    </linearGradient>
    <linearGradient id="m4hair" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a1848"/><stop offset="50%" stop-color="#280e38"/><stop offset="100%" stop-color="#180828"/>
    </linearGradient>
    <radialGradient id="m4skin" cx="45%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fff0e8"/><stop offset="70%" stop-color="#f0d8c8"/><stop offset="100%" stop-color="#e0c0b0"/>
    </radialGradient>
    <linearGradient id="m4robe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d870b0"/><stop offset="50%" stop-color="#b050a0"/><stop offset="100%" stop-color="#802080"/>
    </linearGradient>
    <radialGradient id="m4petal" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffaad0"/><stop offset="100%" stop-color="#d060a0"/>
    </radialGradient>
    <radialGradient id="m4eye" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#8060c0"/><stop offset="50%" stop-color="#4030a0"/><stop offset="100%" stop-color="#201060"/>
    </radialGradient>
    <filter id="m4pg" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feFlood flood-color="#e870c0" flood-opacity="0.5" result="c"/>
      <feComposite in="c" in2="blur" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="m4gw" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <circle cx="50" cy="50" r="49" fill="url(#m4bg)"/>
  <circle cx="50" cy="50" r="48.5" fill="none" stroke="url(#m4pk)" stroke-width="2.5"/>
  <circle cx="50" cy="50" r="45" fill="none" stroke="#e870c0" stroke-width="0.5" opacity="0.3"/>

  <!-- 飄落花瓣（背景裝飾） -->
  <ellipse cx="18" cy="28" rx="4" ry="2" fill="#e870c0" opacity="0.18" transform="rotate(-30,18,28)"/>
  <ellipse cx="82" cy="32" rx="3.5" ry="1.8" fill="#c050a0" opacity="0.14" transform="rotate(25,82,32)"/>
  <ellipse cx="14" cy="58" rx="3" ry="1.5" fill="#e870c0" opacity="0.14" transform="rotate(-15,14,58)"/>
  <ellipse cx="86" cy="55" rx="3.5" ry="1.8" fill="#c050a0" opacity="0.18" transform="rotate(20,86,55)"/>

  <!-- 粉紫袍（身體） -->
  <path d="M5 100 Q12 76 26 68 Q38 62 50 62 L50 100Z" fill="url(#m4robe)"/>
  <path d="M95 100 Q88 76 74 68 Q62 62 50 62 L50 100Z" fill="url(#m4robe)"/>
  <path d="M5 100 Q12 76 26 68 Q38 62 50 62" fill="none" stroke="#ffaad0" stroke-width="1"/>
  <path d="M95 100 Q88 76 74 68 Q62 62 50 62" fill="none" stroke="#ffaad0" stroke-width="1"/>
  <path d="M18 88 Q22 84 26 88" fill="none" stroke="#ffaad0" stroke-width="0.8" opacity="0.6"/>
  <path d="M14 78 Q18 74 22 78" fill="none" stroke="#ffaad0" stroke-width="0.7" opacity="0.5"/>
  <path d="M82 88 Q78 84 74 88" fill="none" stroke="#ffaad0" stroke-width="0.8" opacity="0.6"/>
  <path d="M86 78 Q82 74 78 78" fill="none" stroke="#ffaad0" stroke-width="0.7" opacity="0.5"/>
  <path d="M36 68 L50 75 L64 68 Q58 72 50 73 Q42 72 36 68Z" fill="#c050a0" opacity="0.8"/>
  <path d="M38 70 Q50 74 62 70" fill="none" stroke="#ffaad0" stroke-width="0.8"/>

  <!-- 頸部+翡翠墜飾 -->
  <path d="M44 57 Q44 65 50 66 Q56 65 56 57" fill="url(#m4skin)"/>
  <circle cx="50" cy="68" r="2.5" fill="#60cc88" opacity="0.8" filter="url(#m4gw)"/>
  <circle cx="50" cy="68" r="1.5" fill="#80eea0"/>

  <!-- 臉 -->
  <ellipse cx="50" cy="41" rx="20" ry="22" fill="url(#m4skin)"/>
  <ellipse cx="37" cy="47" rx="6" ry="3.5" fill="#ffb0b0" opacity="0.2"/>
  <ellipse cx="63" cy="47" rx="6" ry="3.5" fill="#ffb0b0" opacity="0.2"/>

  <!-- 暗紫飄髮 -->
  <path d="M30 22 Q18 30 14 50 Q12 65 16 80 Q20 88 20 95" stroke="#280e38" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M31 20 Q19 28 16 46 Q14 58 18 72" stroke="#3a1848" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M70 22 Q82 30 86 50 Q88 65 84 80 Q80 88 80 95" stroke="#280e38" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M69 20 Q81 28 84 46 Q86 58 82 72" stroke="#3a1848" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M30 24 Q50 14 70 24 Q65 17 50 15 Q35 17 30 24Z" fill="#3a1848"/>
  <path d="M33 19 Q50 12 67 19" fill="none" stroke="#5a2868" stroke-width="1.5" opacity="0.5"/>
  <path d="M33 15 Q42 10 50 12 Q58 10 67 15" fill="none" stroke="#4a2058" stroke-width="1.2" opacity="0.6"/>

  <!-- 人耳+耳環 -->
  <ellipse cx="30" cy="43" rx="3" ry="4.5" fill="#e8d0c0"/>
  <ellipse cx="30" cy="43" rx="2" ry="3" fill="#d4a090" opacity="0.4"/>
  <circle cx="30" cy="48" r="1.5" fill="#e870c0" filter="url(#m4pg)"/>
  <circle cx="30" cy="48" r="0.8" fill="#ffaad0"/>
  <ellipse cx="70" cy="43" rx="3" ry="4.5" fill="#e8d0c0"/>
  <circle cx="70" cy="48" r="1.5" fill="#e870c0" filter="url(#m4pg)"/>
  <circle cx="70" cy="48" r="0.8" fill="#ffaad0"/>

  <!-- 左眼（大而溫柔） -->
  <ellipse cx="41" cy="40" rx="6" ry="5" fill="#0a0820"/>
  <ellipse cx="41" cy="40" rx="5" ry="4" fill="url(#m4eye)"/>
  <circle cx="41" cy="40" r="3" fill="#100828"/>
  <circle cx="43" cy="38" r="1.2" fill="white" opacity="0.9"/>
  <circle cx="39.5" cy="41.5" r="0.6" fill="#c0a0e0" opacity="0.5"/>
  <path d="M35 37 Q41 33.5 47 37" fill="none" stroke="#3a1848" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M35.5 36 Q41 34 46.5 36" fill="none" stroke="#5a2858" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <path d="M36 43.5 Q41 45.5 46 43.5" fill="none" stroke="#3a1848" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M36 33 Q41 30 46 32.5" fill="none" stroke="#3a1040" stroke-width="1.8" stroke-linecap="round"/>

  <!-- 右眼（大而溫柔） -->
  <ellipse cx="59" cy="40" rx="6" ry="5" fill="#0a0820"/>
  <ellipse cx="59" cy="40" rx="5" ry="4" fill="url(#m4eye)"/>
  <circle cx="59" cy="40" r="3" fill="#100828"/>
  <circle cx="61" cy="38" r="1.2" fill="white" opacity="0.9"/>
  <circle cx="57.5" cy="41.5" r="0.6" fill="#c0a0e0" opacity="0.5"/>
  <path d="M53 37 Q59 33.5 65 37" fill="none" stroke="#3a1848" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M53.5 36 Q59 34 64.5 36" fill="none" stroke="#5a2858" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <path d="M54 43.5 Q59 45.5 64 43.5" fill="none" stroke="#3a1848" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M54 32.5 Q59 30 64 33" fill="none" stroke="#3a1040" stroke-width="1.8" stroke-linecap="round"/>

  <!-- 鼻（精緻） -->
  <path d="M48.5 46 Q50 48.5 51.5 46" fill="none" stroke="#c09080" stroke-width="0.8" stroke-linecap="round"/>

  <!-- 嘴（溫柔微笑） -->
  <path d="M44 54 Q50 58 56 54" fill="none" stroke="#e07090" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M44.5 54 Q47 52 50 53.5 Q53 52 55.5 54" fill="none" stroke="#e07090" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  <path d="M45 55 Q50 57.5 55 55" fill="none" stroke="#f090a8" stroke-width="0.6" opacity="0.5"/>

  <!-- 花朵髮飾 -->
  <line x1="38" y1="22" x2="34" y2="15" stroke="#c8a000" stroke-width="0.8"/>
  <ellipse cx="32" cy="12" rx="3.5" ry="2" fill="url(#m4petal)" transform="rotate(-30,32,12)" filter="url(#m4pg)"/>
  <ellipse cx="36" cy="10" rx="3.5" ry="2" fill="url(#m4petal)" transform="rotate(10,36,10)" filter="url(#m4pg)"/>
  <ellipse cx="30" cy="8" rx="3.5" ry="2" fill="url(#m4petal)" transform="rotate(-60,30,8)" filter="url(#m4pg)"/>
  <ellipse cx="34" cy="7" rx="3.5" ry="2" fill="url(#m4petal)" transform="rotate(-10,34,7)" filter="url(#m4pg)"/>
  <circle cx="33" cy="10" r="2.5" fill="#ffdd44" filter="url(#m4gw)"/>
  <circle cx="33" cy="10" r="1.5" fill="#ffaa00"/>
  <!-- 次花 -->
  <ellipse cx="40" cy="13" rx="2" ry="1.2" fill="#ffb8d0" transform="rotate(20,40,13)" opacity="0.8"/>
  <ellipse cx="43" cy="11" rx="2" ry="1.2" fill="#ffb8d0" transform="rotate(-10,43,11)" opacity="0.8"/>
  <circle cx="41" cy="12" r="1.2" fill="#ffd044" opacity="0.9"/>

  <!-- 額部印記 -->
  <circle cx="50" cy="28" r="1.5" fill="#e870c0" opacity="0.7" filter="url(#m4pg)"/>

  <!-- 環境粒子 -->
  <ellipse cx="15" cy="38" rx="2.5" ry="1.2" fill="#e870c0" opacity="0.28" transform="rotate(-20,15,38)"/>
  <ellipse cx="84" cy="45" rx="2" ry="1" fill="#c050a0" opacity="0.22" transform="rotate(15,84,45)"/>
  <circle cx="11" cy="55" r="0.8" fill="#e870c0" opacity="0.3"/>
  <circle cx="89" cy="60" r="1" fill="#c050a0" opacity="0.25"/>
</svg>
