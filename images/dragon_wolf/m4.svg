  <ellipse cx="56" cy="26" rx="3.5" ry="2.5" fill="#1A0A20"/>
  <circle cx="44" cy="26" r="1.5" fill="#FF6B9D"/>
  <circle cx="56" cy="26" r="1.5" fill="#FF6B9D"/>
  <!-- 服裝 -->
