  <!-- 桃花 -->
  <g transform="translate(22,42)">
    <circle cx="0" cy="-6" r="4" fill="#FF8FAB" opacity="0.8"/>
    <circle cx="5" cy="-2" r="4" fill="#FF8FAB" opacity="0.8"/>
