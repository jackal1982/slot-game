<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="m4bg" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#3d1f5e"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </radialGradient>
    <linearGradient id="m4face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce4d8"/>
      <stop offset="100%" stop-color="#f0c8b8"/>
    </linearGradient>
    <linearGradient id="m4hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1040"/>
      <stop offset="100%" stop-color="#1a0828"/>
    </linearGradient>
    <linearGradient id="m4dress" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8a0c8"/>
      <stop offset="100%" stop-color="#8050a0"/>
    </linearGradient>
    <filter id="m4glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#m4bg)" stroke="#d8a0c8" stroke-width="2"/>
  <!-- Dress/shoulders -->
  <path d="M25,88 Q30,72 36,68 Q42,64 50,62 Q58,64 64,68 Q70,72 75,88" fill="url(#m4dress)"/>
  <!-- Collar detail -->
  <path d="M40,66 Q45,70 50,71 Q55,70 60,66 Q56,69 50,70 Q44,69 40,66Z" fill="#e8c0d8"/>
  <!-- Neck -->
  <rect x="45" y="58" width="10" height="7" rx="3" fill="url(#m4face)"/>
  <!-- Face -->
  <ellipse cx="50" cy="42" rx="16" ry="20" fill="url(#m4face)"/>
  <!-- Blush -->
  <circle cx="38" cy="46" r="4" fill="#ff9999" opacity="0.25"/>
  <circle cx="62" cy="46" r="4" fill="#ff9999" opacity="0.25"/>
  <!-- Hair - long flowing dark purple -->
  <path d="M34,30 Q28,40 24,55 Q22,65 24,80 Q26,68 28,55 Q30,42 34,34Z" fill="url(#m4hair)"/>
  <path d="M66,30 Q72,40 76,55 Q78,65 76,80 Q74,68 72,55 Q70,42 66,34Z" fill="url(#m4hair)"/>
  <!-- Hair top -->
  <path d="M34,30 Q38,20 50,18 Q62,20 66,30 Q62,24 50,22 Q38,24 34,30Z" fill="url(#m4hair)"/>
  <!-- Hair strands -->
  <path d="M38,24 Q36,30 34,38" stroke="#3a1850" stroke-width="0.5" fill="none"/>
  <path d="M62,24 Q64,30 66,38" stroke="#3a1850" stroke-width="0.5" fill="none"/>
  <!-- Flower hair ornament -->
  <circle cx="36" cy="24" r="4" fill="#ff88aa" filter="url(#m4glow)"/>
  <circle cx="36" cy="24" r="2" fill="#ffaacc"/>
  <circle cx="36" cy="24" r="0.8" fill="#FFD700"/>
  <!-- Petal details -->
  <ellipse cx="34" cy="22" rx="2" ry="1.2" fill="#ff88aa" transform="rotate(-30 34 22)"/>
  <ellipse cx="38" cy="22" rx="2" ry="1.2" fill="#ff88aa" transform="rotate(30 38 22)"/>
  <ellipse cx="36" cy="20" rx="1.2" ry="2" fill="#ff88aa"/>
  <!-- Eyes - large gentle -->
  <ellipse cx="42" cy="41" rx="5" ry="4" fill="white" stroke="#a080a0" stroke-width="0.3"/>
  <circle cx="43" cy="41.5" r="2.5" fill="#6a2080"/>
  <circle cx="43" cy="41.5" r="1.2" fill="#2a0840"/>
  <circle cx="42" cy="40.5" r="0.8" fill="white"/>
  <circle cx="44" cy="42" r="0.4" fill="white" opacity="0.6"/>
  <!-- Eyelashes -->
  <path d="M37,39 Q38,37 40,38" stroke="#2a1040" stroke-width="0.5" fill="none"/>
  <path d="M45,38 Q47,37 48,39" stroke="#2a1040" stroke-width="0.5" fill="none"/>
  <ellipse cx="58" cy="41" rx="5" ry="4" fill="white" stroke="#a080a0" stroke-width="0.3"/>
  <circle cx="57" cy="41.5" r="2.5" fill="#6a2080"/>
  <circle cx="57" cy="41.5" r="1.2" fill="#2a0840"/>
  <circle cx="56" cy="40.5" r="0.8" fill="white"/>
  <circle cx="58" cy="42" r="0.4" fill="white" opacity="0.6"/>
  <path d="M52,39 Q53,37 55,38" stroke="#2a1040" stroke-width="0.5" fill="none"/>
  <path d="M60,38 Q62,37 63,39" stroke="#2a1040" stroke-width="0.5" fill="none"/>
  <!-- Eyebrows - gentle arch -->
  <path d="M37,36 Q40,34 46,36" stroke="#3a1850" stroke-width="0.8" fill="none"/>
  <path d="M54,36 Q60,34 63,36" stroke="#3a1850" stroke-width="0.8" fill="none"/>
  <!-- Nose - small delicate -->
  <path d="M49,44 L50,48 L51,47.5" stroke="#d0a898" stroke-width="0.5" fill="none"/>
  <!-- Lips - small, gentle smile -->
  <path d="M45,52 Q48,54 50,53.5 Q52,54 55,52" stroke="#cc6688" stroke-width="0.8" fill="none"/>
  <path d="M46,52.5 Q48,54 50,53.5 Q52,54 54,52.5" fill="#dd7799" opacity="0.5"/>
  <text x="50" y="96" text-anchor="middle" font-size="8" font-weight="bold" fill="#d8a0c8" font-family="serif">憶無心</text>
</svg>