<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 黑白郎君 M1: 半黑半白臉 / 日月珍珠冠 / 邪魅表情 -->
  <defs>
    <radialGradient id="m1bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#2d1055"/><stop offset="100%" stop-color="#0d0520"/>
    </radialGradient>
    <linearGradient id="m1gld" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe566"/><stop offset="50%" stop-color="#ffd700"/><stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <radialGradient id="m1cgld" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fff0a0"/><stop offset="100%" stop-color="#c8a000"/>
    </radialGradient>
    <linearGradient id="m1wsk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff5ee"/><stop offset="100%" stop-color="#e8c8b8"/>
    </linearGradient>
    <linearGradient id="m1bsk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a1818"/><stop offset="100%" stop-color="#150808"/>
    </linearGradient>
    <radialGradient id="m1gem" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ff8888"/><stop offset="60%" stop-color="#cc0000"/><stop offset="100%" stop-color="#660000"/>
    </radialGradient>
    <filter id="m1sun" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="m1red" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feFlood flood-color="#cc0000" flood-opacity="0.5" result="c"/>
      <feComposite in="c" in2="blur" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="m1gold" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feFlood flood-color="#ffd700" flood-opacity="0.4" result="c"/>
      <feComposite in="c" in2="blur" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="m1lh"><rect x="0" y="0" width="50" height="100"/></clipPath>
    <clipPath id="m1rh"><rect x="50" y="0" width="50" height="100"/></clipPath>
  </defs>

  <!-- 背景 -->
  <circle cx="50" cy="50" r="49" fill="url(#m1bg)"/>
  <circle cx="50" cy="50" r="48.5" fill="none" stroke="url(#m1gld)" stroke-width="2.5"/>
  <circle cx="50" cy="50" r="45" fill="none" stroke="#ffd700" stroke-width="0.4" opacity="0.3"/>

  <!-- 白袍（左）黑袍（右） -->
  <path d="M8 100 Q15 78 28 70 Q38 64 50 63 L50 100Z" fill="#dde0e8"/>
  <path d="M92 100 Q85 78 72 70 Q62 64 50 63 L50 100Z" fill="#12121e"/>
  <path d="M8 100 Q15 78 28 70 Q38 64 50 63" fill="none" stroke="#d4af37" stroke-width="1.2"/>
  <path d="M92 100 Q85 78 72 70 Q62 64 50 63" fill="none" stroke="#d4af37" stroke-width="1.2"/>
  <path d="M22 88 Q30 80 42 74" fill="none" stroke="#c0c4cc" stroke-width="0.7" opacity="0.5"/>
  <path d="M78 88 Q70 80 58 74" fill="none" stroke="#3a3a4a" stroke-width="0.7" opacity="0.5"/>
  <path d="M38 68 L50 74 L62 68" fill="none" stroke="#d4af37" stroke-width="1.2"/>

  <!-- 頸部 -->
  <path d="M43 58 Q43 65 50 66 Q57 65 57 58 Q54 62 50 62 Q46 62 43 58Z" fill="#ddc0b0"/>

  <!-- 臉 -->
  <ellipse cx="50" cy="41" rx="21" ry="23" fill="#ddc0b0"/>
  <path d="M50 18 Q29 19 29 41 Q29 58 50 64 Z" fill="url(#m1wsk)"/>
  <path d="M50 18 Q71 19 71 41 Q71 58 50 64 Z" fill="url(#m1bsk)"/>
  <!-- 黑白分界金線 -->
  <line x1="50" y1="18" x2="50" y2="64" stroke="#d4af37" stroke-width="1.2"/>

  <!-- 耳朵 -->
  <ellipse cx="29" cy="43" rx="3" ry="4" fill="#ddc0b0"/>
  <ellipse cx="29" cy="43" rx="2" ry="2.5" fill="#c8a090" opacity="0.5"/>
  <ellipse cx="71" cy="43" rx="3" ry="4" fill="#280e0e"/>

  <!-- 左眼（白側，深邃紫眸） -->
  <ellipse cx="42" cy="40" rx="5" ry="4" fill="#1a0a2e"/>
  <ellipse cx="42" cy="40" rx="4" ry="3" fill="#2a1040"/>
  <circle cx="42" cy="40" r="2.5" fill="#0a0a1e"/>
  <circle cx="43.5" cy="38.5" r="1" fill="white" opacity="0.85"/>
  <circle cx="40.8" cy="40.8" r="0.5" fill="white" opacity="0.4"/>
  <path d="M37 37 Q42 34.5 47 37" fill="none" stroke="#1a0a0a" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M37.5 43.5 Q42 45 46.5 43.5" fill="none" stroke="#1a0a0a" stroke-width="0.7" stroke-linecap="round"/>
  <path d="M37 34 Q42 31 47 33" fill="none" stroke="#1a0a0a" stroke-width="1.8" stroke-linecap="round"/>

  <!-- 右眼（黑側，紅光） -->
  <ellipse cx="58" cy="40" rx="5" ry="4" fill="#3a0000" filter="url(#m1red)"/>
  <ellipse cx="58" cy="40" rx="4" ry="3" fill="#8b0000"/>
  <circle cx="58" cy="40" r="2.5" fill="#4a0000"/>
  <circle cx="59.5" cy="38.5" r="1" fill="#ff8888" opacity="0.9"/>
  <path d="M53 37 Q58 34.5 63 37" fill="none" stroke="#4a0000" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M53.5 43.5 Q58 45 62.5 43.5" fill="none" stroke="#4a0000" stroke-width="0.7" stroke-linecap="round"/>
  <path d="M53 34 Q58 30.5 63 33" fill="none" stroke="#3a0000" stroke-width="1.8" stroke-linecap="round"/>

  <!-- 鼻 -->
  <path d="M48 47 Q50 50 52 47" fill="none" stroke="#a08070" stroke-width="0.9" stroke-linecap="round"/>

  <!-- 嘴（邪魅冷笑） -->
  <path d="M43 55 Q47 58 50 57" fill="none" stroke="#9b3030" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M50 57 Q54 57.5 58 55" fill="none" stroke="#5a1818" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M45 57 Q50 60 55 57" fill="none" stroke="#c07060" stroke-width="0.6" opacity="0.5"/>

  <!-- 黑色長髮 -->
  <path d="M30 22 Q22 32 20 50 Q19 60 22 68" stroke="#0a0505" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M31 20 Q23 30 22 46" stroke="#1a0a0a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M70 22 Q78 32 80 50 Q81 60 78 68" stroke="#0a0505" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M69 20 Q77 30 78 46" stroke="#1a0a0a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M30 23 Q50 13 70 23 Q65 17 50 15 Q35 17 30 23Z" fill="#0a0505"/>

  <!-- 冠帶 -->
  <path d="M30 24 Q50 16 70 24 Q66 19 50 17 Q34 19 30 24Z" fill="url(#m1cgld)" filter="url(#m1gold)"/>
  <!-- 冠尖三枝 -->
  <polygon points="50,5 47,16 53,16" fill="url(#m1gld)" filter="url(#m1gold)"/>
  <polygon points="50,5 47.5,13 52.5,13" fill="url(#m1cgld)"/>
  <polygon points="36,8 34,18 40,18" fill="url(#m1gld)"/>
  <polygon points="64,8 60,18 66,18" fill="url(#m1gld)"/>

  <!-- 日飾（左冠） -->
  <circle cx="37" cy="13" r="4.5" fill="#ffdd00" filter="url(#m1sun)"/>
  <circle cx="37" cy="13" r="3" fill="#ffaa00"/>
  <circle cx="37" cy="13" r="1.5" fill="#ff8800"/>
  <line x1="37" y1="7.5" x2="37" y2="5.5" stroke="#ffdd00" stroke-width="1" stroke-linecap="round"/>
  <line x1="37" y1="18.5" x2="37" y2="20.5" stroke="#ffdd00" stroke-width="1" stroke-linecap="round"/>
  <line x1="31.5" y1="13" x2="29.5" y2="13" stroke="#ffdd00" stroke-width="1" stroke-linecap="round"/>
  <line x1="42.5" y1="13" x2="44.5" y2="13" stroke="#ffdd00" stroke-width="1" stroke-linecap="round"/>
  <line x1="33.3" y1="9.3" x2="31.9" y2="7.9" stroke="#ffdd00" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="40.7" y1="16.7" x2="42.1" y2="18.1" stroke="#ffdd00" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="33.3" y1="16.7" x2="31.9" y2="18.1" stroke="#ffdd00" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="40.7" y1="9.3" x2="42.1" y2="7.9" stroke="#ffdd00" stroke-width="0.8" stroke-linecap="round"/>

  <!-- 月飾（右冠） -->
  <path d="M63 18 Q67.5 13 63 8 Q59 8 57.5 11 Q56 14 57.5 17 Q59 19.5 63 18Z" fill="#e0e8ff" filter="url(#m1sun)"/>
  <circle cx="60.5" cy="13" r="0.6" fill="#c0c8ff" opacity="0.6"/>

  <!-- 中央紅寶石 -->
  <circle cx="50" cy="11" r="3.5" fill="#880000" filter="url(#m1red)"/>
  <circle cx="50" cy="11" r="2.8" fill="url(#m1gem)"/>
  <ellipse cx="49" cy="9.8" rx="1" ry="0.7" fill="white" opacity="0.6" transform="rotate(-20,49,9.8)"/>

  <!-- 額印 -->
  <path d="M47.5 29 L50 26 L52.5 29 L50 27.5Z" fill="#ffd700" opacity="0.7"/>

  <!-- 流蘇垂飾 -->
  <line x1="33" y1="24" x2="30" y2="33" stroke="#d4af37" stroke-width="0.7"/>
  <circle cx="30" cy="33" r="1.2" fill="#d4af37"/>
  <line x1="30" y1="34.2" x2="30" y2="38" stroke="#d4af37" stroke-width="0.5"/>
  <line x1="67" y1="24" x2="70" y2="33" stroke="#d4af37" stroke-width="0.7"/>
  <circle cx="70" cy="33" r="1.2" fill="#d4af37"/>
  <line x1="70" y1="34.2" x2="70" y2="38" stroke="#d4af37" stroke-width="0.5"/>

  <!-- 環境粒子 -->
  <circle cx="15" cy="30" r="0.8" fill="#ffd700" opacity="0.3"/>
  <circle cx="85" cy="25" r="0.7" fill="#cc0000" opacity="0.35"/>
  <circle cx="12" cy="65" r="0.6" fill="#ffd700" opacity="0.2"/>
  <circle cx="88" cy="60" r="0.7" fill="#cc0000" opacity="0.25"/>
</svg>
