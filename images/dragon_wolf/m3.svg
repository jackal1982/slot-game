  <polygon points="36,22 32,8 44,20" fill="#E0E0F0" stroke="#A0C0FF" stroke-width="1.5"/>
  <polygon points="64,22 68,8 56,20" fill="#E0E0F0" stroke="#A0C0FF" stroke-width="1.5"/>
  <polygon points="37,20 34,10 43,20" fill="#FFB0C0" opacity="0.5"/>
  <polygon points="63,20 66,10 57,20" fill="#FFB0C0" opacity="0.5"/>
