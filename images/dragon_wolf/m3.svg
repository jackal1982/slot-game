<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="m3bg" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#d0d8e8"/>
      <stop offset="100%" stop-color="#8090a8"/>
    </radialGradient>
    <linearGradient id="m3face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f4f0"/>
      <stop offset="100%" stop-color="#e8e0d8"/>
    </linearGradient>
    <linearGradient id="m3hair" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#c8c0b8"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="m3fur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0ece8"/>
      <stop offset="100%" stop-color="#c8c0b8"/>
    </linearGradient>
    <filter id="m3glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#m3bg)" stroke="#e0e8f0" stroke-width="2"/>
  <!-- Fur collar/shoulders -->
  <path d="M20,88 Q25,70 32,65 Q38,62 44,60 L50,59 L56,60 Q62,62 68,65 Q75,70 80,88" fill="url(#m3fur)"/>
  <!-- Fur texture lines -->
  <path d="M28,75 Q30,72 32,70" stroke="#a8a098" stroke-width="0.5" fill="none"/>
  <path d="M34,72 Q36,69 38,67" stroke="#a8a098" stroke-width="0.5" fill="none"/>
  <path d="M72,75 Q70,72 68,70" stroke="#a8a098" stroke-width="0.5" fill="none"/>
  <path d="M66,72 Q64,69 62,67" stroke="#a8a098" stroke-width="0.5" fill="none"/>
  <!-- Neck -->
  <rect x="44" y="56" width="12" height="7" rx="3" fill="#e8ddd0"/>
  <!-- Face -->
  <ellipse cx="50" cy="42" rx="17" ry="20" fill="url(#m3face)"/>
  <!-- Wolf ears -->
  <path d="M32,25 L28,8 L38,22Z" fill="url(#m3hair)" stroke="#c0b8b0" stroke-width="0.5"/>
  <path d="M34,20 L30,12 L37,22Z" fill="#ffcccc" opacity="0.4"/>
  <path d="M68,25 L72,8 L62,22Z" fill="url(#m3hair)" stroke="#c0b8b0" stroke-width="0.5"/>
  <path d="M66,20 L70,12 L63,22Z" fill="#ffcccc" opacity="0.4"/>
  <!-- Spiky punk hair -->
  <path d="M35,26 Q38,18 42,14 Q45,10 48,6 Q49,12 50,18 Q51,12 52,6 Q55,10 58,14 Q62,18 65,26 Q60,22 55,20 Q50,19 45,20 Q40,22 35,26Z" fill="url(#m3hair)"/>
  <!-- Hair spikes highlight -->
  <path d="M44,14 L46,8 L47,16" fill="white" opacity="0.4"/>
  <path d="M52,12 L54,5 L55,14" fill="white" opacity="0.4"/>
  <!-- Eyes - ice blue, fierce -->
  <ellipse cx="42" cy="40" rx="5" ry="3.5" fill="white" stroke="#8090a8" stroke-width="0.5"/>
  <circle cx="43" cy="40" r="2.2" fill="#00BFFF"/>
  <ellipse cx="43" cy="40" rx="1" ry="2" fill="#0080FF"/>
  <circle cx="42.5" cy="39.5" r="0.6" fill="white"/>
  <ellipse cx="58" cy="40" rx="5" ry="3.5" fill="white" stroke="#8090a8" stroke-width="0.5"/>
  <circle cx="57" cy="40" r="2.2" fill="#00BFFF"/>
  <ellipse cx="57" cy="40" rx="1" ry="2" fill="#0080FF"/>
  <circle cx="57.5" cy="39.5" r="0.6" fill="white"/>
  <!-- Eyebrows - fierce -->
  <path d="M35,35 Q39,33 46,36" stroke="#a0988e" stroke-width="1.2" fill="none"/>
  <path d="M54,36 Q61,33 65,35" stroke="#a0988e" stroke-width="1.2" fill="none"/>
  <!-- Nose -->
  <path d="M49,43 L50,48 L51,47" stroke="#b8a898" stroke-width="0.5" fill="none"/>
  <!-- Mouth with fangs -->
  <path d="M42,52 Q46,55 50,54 Q54,55 58,52" stroke="#a08080" stroke-width="0.8" fill="none"/>
  <!-- Fangs -->
  <path d="M44,53 L43,56 L45,54" fill="white" stroke="#ccc" stroke-width="0.3"/>
  <path d="M56,53 L57,56 L55,54" fill="white" stroke="#ccc" stroke-width="0.3"/>
  <!-- Scar on cheek -->
  <path d="M62,44 L66,48 M63,46 L67,44" stroke="#cc8888" stroke-width="0.5" opacity="0.6"/>
  <text x="50" y="96" text-anchor="middle" font-size="8" font-weight="bold" fill="#5070a0" font-family="serif">白狼</text>
</svg>