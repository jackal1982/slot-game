  </defs>
  <circle cx="50" cy="50" r="48" fill="#0D1220" stroke="#A0C0FF" stroke-width="2.5"/>
  <circle cx="50" cy="50" r="48" fill="url(#m3Glow)"/>
  <!-- 狼身體 -->
