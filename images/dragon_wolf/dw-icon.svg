  </defs>
  <rect width="120" height="120" rx="16" fill="url(#iconBg)"/>
  <rect width="120" height="120" rx="16" fill="url(#iconGlow)"/>
  <!-- 外框 -->
  <rect x="4" y="4" width="112" height="112" rx="13" fill="none" stroke="#C9A227" stroke-width="2"/>
