  <path d="M60 20 A40 40 0 0 0 60 100 A20 20 0 0 0 60 60 A20 20 0 0 1 60 20" fill="#1A1A1A"/>
  <circle cx="60" cy="40" r="7" fill="#1A1A1A"/>
  <circle cx="60" cy="80" r="7" fill="#E8E8E8"/>
  <circle cx="60" cy="40" r="3" fill="#E8E8E8"/>
  <circle cx="60" cy="80" r="3" fill="#1A1A1A"/>
  <circle cx="60" cy="60" r="42" fill="none" stroke="#FFD700" stroke-width="2.5"/>
  <!-- 左下角龍紋 -->
  <path d="M10 95 Q20 85 25 75 Q30 65 22 58 Q18 62 20 68 Q16 72 14 80 Q10 88 12 96" fill="#6A0DAD" opacity="0.7" stroke="#9B59B6" stroke-width="1"/>
