<!-- Dragon Wolf Legend game view — dynamically loaded by router.js -->
<div id="dw-game-container" class="view-hidden">
    <!-- 返回大廳 -->
    <button id="dw-btn-return-lobby" title="返回大廳">&#9664; LOBBY</button>

    <!-- 標題列 -->
    <div id="dw-header">
        <h1>黑白龍狼傳</h1>
        <p class="dw-subtitle">Legend of Dragon &amp; Wolf</p>
    </div>

    <!-- Info Bar -->
    <div id="dw-info-bar">
        <div class="dw-info-box">
            <span class="dw-info-label">BALANCE</span>
            <span class="dw-info-value" id="dw-balance">10,000</span>
        </div>
        <div class="dw-info-box">
            <span class="dw-info-label">WIN</span>
            <span class="dw-info-value" id="dw-win-amount">0</span>
        </div>
        <div class="dw-info-box">
            <span class="dw-info-label">TOTAL BET</span>
            <span class="dw-info-value" id="dw-total-bet">50</span>
        </div>
    </div>

    <!-- Free Spins HUD -->
    <div id="dw-fs-hud" class="hidden">
        <div id="dw-fs-counter">FREE SPINS: <span id="dw-fs-remaining">0</span> / <span id="dw-fs-total">0</span></div>
        <div id="dw-fs-win-display">WIN: <span id="dw-fs-win-amount">0</span></div>
    </div>

    <!-- Main Reel Area -->
    <div id="dw-reel-area">
        <div id="dw-reel-grid">
            <div class="dw-reel-viewport" data-reel="0">
                <div class="dw-reel-strip" id="dw-reel-strip-0"></div>
            </div>
            <div class="dw-reel-viewport" data-reel="1">
                <div class="dw-reel-strip" id="dw-reel-strip-1"></div>
            </div>
            <div class="dw-reel-viewport" data-reel="2">
                <div class="dw-reel-strip" id="dw-reel-strip-2"></div>
            </div>
            <div class="dw-reel-viewport" data-reel="3">
                <div class="dw-reel-strip" id="dw-reel-strip-3"></div>
            </div>
            <div class="dw-reel-viewport" data-reel="4">
                <div class="dw-reel-strip" id="dw-reel-strip-4"></div>
            </div>
        </div>
        <!-- 訊息顯示 -->
        <div id="dw-message-display"></div>
        <!-- 氣功特效層（降龍十八掌風格） -->
        <div id="dw-qigong-overlay" class="hidden">
            <img id="dw-qigong-m1" src="images/dragon_wolf/m1-qigong.png" alt="黑白郎君氣功">
            <!-- 氣功球（單顆，大小由 JS 依 tier 設定） -->
            <div id="dw-qg-ball"></div>
            <!-- 蓄力收縮環 ×3 -->
            <div class="dw-qg-charge-ring"></div>
            <div class="dw-qg-charge-ring"></div>
            <div class="dw-qg-charge-ring"></div>
            <!-- 掌印氣勁 ×5 -->
            <div class="dw-qg-palm" id="dw-qg-palm-0"></div>
            <div class="dw-qg-palm" id="dw-qg-palm-1"></div>
            <div class="dw-qg-palm" id="dw-qg-palm-2"></div>
            <div class="dw-qg-palm" id="dw-qg-palm-3"></div>
            <div class="dw-qg-palm" id="dw-qg-palm-4"></div>
        </div>
    </div>

    <!-- Control Panel -->
    <div id="dw-controls">
        <div id="dw-left-controls">
            <div id="dw-bet-controls">
                <button id="dw-btn-bet-down" class="dw-ctrl-btn" aria-label="減少倍數">&#8722;</button>
                <div id="dw-bet-display">
                    <div class="dw-bet-label">BET ×</div>
                    <div id="dw-bet-multiplier">1x</div>
                </div>
                <button id="dw-btn-bet-up" class="dw-ctrl-btn" aria-label="增加倍數">+</button>
            </div>
            <div id="dw-total-bet-display">1注 = <span id="dw-base-bet-label">50</span> 分</div>
        </div>

        <button id="dw-btn-spin">SPIN</button>

        <div id="dw-extra-controls">
            <button id="dw-btn-max-bet" class="dw-ctrl-btn small">MAX BET</button>
            <button id="dw-btn-turbo" class="dw-ctrl-btn small">TURBO</button>
            <button id="dw-btn-auto" class="dw-ctrl-btn small">AUTO</button>
        </div>
    </div>

    <!-- Bottom Bar -->
    <div id="dw-bottom-bar">
        <button id="dw-btn-paytable" class="dw-icon-btn">PAYTABLE</button>
        <button id="dw-btn-sound" class="dw-icon-btn">SOUND: ON</button>
        <button id="dw-btn-music" class="dw-icon-btn">MUSIC: ON</button>
    </div>

    <!-- Debug Panel（轉場動畫 debug 用） -->
    <div id="dw-debug-panel" style="
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 99999;
        background: rgba(0,0,0,0.85);
        color: #0f0;
        font-family: monospace;
        font-size: 9px;
        padding: 8px;
        max-width: 300px;
        max-height: 60vh;
        overflow-y: scroll;
        border: 1px solid #0f0;
        display: none;
        pointer-events: auto;
        -webkit-overflow-scrolling: touch;
        -webkit-transform: translateZ(0);
    "></div>

    <!-- FS 轉場動畫（龍狼融合 → 水墨暈開 → 郎君綻放） -->
    <div id="dw-fs-transition" class="hidden">
      <div id="dw-trans-content">
        <!-- 背景層：暗幕 + 水墨暈染 -->
        <div id="dw-trans-dark-bg"></div>
        <div id="dw-trans-ink-wash"></div>

        <!-- 龍（含 3 個殘影） -->
        <div id="dw-trans-dragon-wrap">
            <div class="dw-trans-ghost"></div>
            <div class="dw-trans-ghost"></div>
            <div class="dw-trans-ghost"></div>
            <img id="dw-trans-dragon" src="images/dragon_wolf/m2-transition.png" alt="黑龍">
        </div>

        <!-- 狼（含 3 個殘影） -->
        <div id="dw-trans-wolf-wrap">
            <div class="dw-trans-ghost"></div>
            <div class="dw-trans-ghost"></div>
            <div class="dw-trans-ghost"></div>
            <img id="dw-trans-wolf" src="images/dragon_wolf/m3-transition.png" alt="白狼">
        </div>

        <!-- 碰撞水墨爆發 -->
        <div id="dw-trans-ink-burst"></div>

        <!-- 速度線 -->
        <div id="dw-trans-speed-lines"></div>

        <!-- 黑白郎君 + 光暈 -->
        <div id="dw-trans-mw-wrap">
            <div id="dw-trans-mw-glow"></div>
            <img id="dw-trans-mw" src="images/dragon_wolf/m1-transition.png" alt="黑白郎君">
        </div>

        <!-- 文字 -->
        <div id="dw-trans-text">
            <p>免費遊戲</p>
            <span id="dw-trans-spin-count">× 10</span>
        </div>
      </div>
    </div>

    <!-- Retrigger Overlay -->
    <div id="dw-retrigger-overlay" class="hidden">
        <div>RETRIGGER!</div>
        <div class="dw-retrigger-count">+10</div>
    </div>

    <!-- FS Summary Overlay -->
    <div id="dw-fs-summary" class="dw-overlay hidden">
        <div class="dw-overlay-box">
            <h2>免費遊戲結束！</h2>
            <p>本次總獎金</p>
            <span class="dw-big-number" id="dw-fs-summary-amount">0</span>
        </div>
    </div>

    <!-- Paytable Modal -->
    <div id="dw-paytable-overlay" class="dw-overlay hidden">
        <div id="dw-paytable-modal">
            <button id="dw-paytable-close">&times;</button>
            <h2>PAYTABLE</h2>
            <div id="dw-paytable-content"></div>
        </div>
    </div>
</div>
